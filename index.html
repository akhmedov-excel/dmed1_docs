<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMED Documents</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: white;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #e8e8e8;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img.logo-img {
  width: 40px;
  height: 40px;
  object-fit: contain;
}

.logo-name {
  font-size: 22px;
  font-weight: 800;
  color: #1565C0;
  letter-spacing: 1px;
  display: block;
  line-height: 1;
}

.logo-sub {
  font-size: 12px;
  color: #1565C0;
  font-weight: 500;
  display: block;
}

.flag-img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 56px 20px 40px;
}

#page-pin {
  width: 100%;
  max-width: 420px;
}

.pin-title {
  font-size: 22px;
  font-weight: 700;
  color: #111;
  text-align: center;
  margin-bottom: 32px;
  line-height: 1.35;
}

.pin-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 20px;
}

.pin-box {
  width: 72px;
  height: 60px;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  font-size: 26px;
  font-weight: 700;
  color: #111;
  text-align: center;
  outline: none;
  background: white;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.pin-box:focus {
  border-color: #1565C0;
  box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
}

.pin-box.error {
  border-color: #E53935;
  background: #fff5f5;
  animation: shake 0.35s;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-7px); }
  75% { transform: translateX(7px); }
}

.error-text {
  text-align: center;
  color: #E53935;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 16px;
  min-height: 18px;
  display: none;
}
.error-text.show { display: block; }

.btn-open {
  width: 100%;
  padding: 15px;
  background: #d0d0d0;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: not-allowed;
  transition: background 0.2s;
  font-family: inherit;
  margin-bottom: 40px;
}

.btn-open.ready {
  background: #1565C0;
  cursor: pointer;
}

.btn-open.ready:hover { background: #1251a3; }

.hint-card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  display: flex;
  gap: 14px;
  align-items: center;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

.hint-doc {
  flex-shrink: 0;
  width: 88px;
  background: #f5f5f5;
  border-radius: 6px;
  padding: 10px 8px;
}

.hint-line {
  height: 5px;
  background: #ddd;
  border-radius: 3px;
  margin-bottom: 5px;
}

.hint-doc-bottom {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 10px;
}

.hint-pin-badge {
  background: #64B5F6;
  color: white;
  font-size: 10px;
  font-weight: 800;
  padding: 2px 5px;
  border-radius: 3px;
}

.hint-qr-mini {
  width: 20px; height: 20px;
  background: #555;
  border-radius: 2px;
}

.hint-arrow { font-size: 20px; color: #aaa; }
.hint-right { flex: 1; }

.hint-pin-big {
  background: #64B5F6;
  color: white;
  font-size: 22px;
  font-weight: 800;
  padding: 8px 18px;
  border-radius: 8px;
  display: inline-block;
  margin-bottom: 8px;
  letter-spacing: 2px;
}

.hint-desc {
  font-size: 12.5px;
  color: #666;
  line-height: 1.5;
}

/* PDF VIEWER */
#page-pdf {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 999;
  flex-direction: column;
  background: white;
}

#page-pdf.active { display: flex; }

.pdf-topbar {
  background: #1565C0;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.pdf-back-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 6px;
  font-family: inherit;
  line-height: 1;
}

.pdf-topbar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  color: white;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
}

.pdf-topbar-logo img {
  width: 26px; height: 26px;
  object-fit: contain;
  filter: brightness(0) invert(1);
}

.pdf-verified {
  margin-left: auto;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
}

#pdf-viewer {
  flex: 1;
  overflow-y: auto;
  background: #e0e0e0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  gap: 12px;
}

#pdf-viewer canvas {
  max-width: 100%;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  background: white;
  display: block;
}

.pdf-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: #666;
  gap: 16px;
  width: 100%;
}

.spinner {
  width: 40px; height: 40px;
  border: 4px solid #ddd;
  border-top-color: #1565C0;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.pdf-loading p { font-size: 14px; font-weight: 500; }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
var CORRECT_PIN = "1738";
var pins = [
  document.getElementById("p1"),
  document.getElementById("p2"),
  document.getElementById("p3"),
  document.getElementById("p4")
];
var openBtn = document.getElementById("open-btn");
var errMsg  = document.getElementById("err");

pins.forEach(function(box, i) {
  box.addEventListener("input", function() {
    box.value = box.value.replace(/[^0-9]/g, "");
    if (box.value && i < 3) pins[i+1].focus();
    updateBtn();
  });
  box.addEventListener("keydown", function(e) {
    if (e.key === "Backspace" && !box.value && i > 0) {
      pins[i-1].focus();
      pins[i-1].value = "";
      updateBtn();
    }
    if (e.key === "Enter") checkPin();
  });
  box.addEventListener("paste", function(e) {
    e.preventDefault();
    var t = (e.clipboardData || window.clipboardData).getData("text").replace(/[^0-9]/g, "");
    t.split("").slice(0, 4).forEach(function(c, j) {
      if (pins[j]) pins[j].value = c;
    });
    pins[Math.min(t.length - 1, 3)].focus();
    updateBtn();
  });
});

function updateBtn() {
  var full = pins.every(function(p) { return p.value.length === 1; });
  if (full) {
    openBtn.classList.add("ready");
  } else {
    openBtn.classList.remove("ready");
  }
}

function checkPin() {
  if (!openBtn.classList.contains("ready")) return;
  var entered = pins.map(function(p) { return p.value; }).join("");
  if (entered === CORRECT_PIN) {
    showPDF();
  } else {
    pins.forEach(function(p) {
      p.classList.add("error");
      p.value = "";
    });
    errMsg.classList.add("show");
    pins[0].focus();
    openBtn.classList.remove("ready");
    setTimeout(function() {
      pins.forEach(function(p) { p.classList.remove("error"); });
      errMsg.classList.remove("show");
    }, 2500);
  }
}

function goBack() {
  document.getElementById("page-pdf").classList.remove("active");
  pins.forEach(function(p) { p.value = ""; p.classList.remove("error"); });
  openBtn.classList.remove("ready");
}

var pdfRendered = false;

function b64toUint8(b64) {
  var bin = atob(b64);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function showPDF() {
  document.getElementById("page-pdf").classList.add("active");
  if (pdfRendered) return;
  pdfRendered = true;

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  var pdfData = b64toUint8(PDF_B64);

  pdfjsLib.getDocument({data: pdfData}).promise.then(function(pdf) {
    var viewer = document.getElementById("pdf-viewer");
    var loading = document.getElementById("pdf-loading");
    if (loading) loading.remove();

    var scale = window.innerWidth < 600 ? 1.2 : 1.8;
    var pages = [];
    for (var i = 1; i <= pdf.numPages; i++) {
      pages.push(i);
    }

    function renderPage(num) {
      return pdf.getPage(num).then(function(page) {
        var viewport = page.getViewport({scale: scale});
        var canvas = document.createElement("canvas");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        viewer.appendChild(canvas);
        return page.render({
          canvasContext: canvas.getContext("2d"),
          viewport: viewport
        }).promise;
      });
    }

    pages.reduce(function(chain, num) {
      return chain.then(function() { return renderPage(num); });
    }, Promise.resolve());

  }).catch(function(err) {
    console.error(err);
    var loading = document.getElementById("pdf-loading");
    if (loading) loading.innerHTML = "<p style='color:#E53935'>Xatolik yuz berdi.</p>";
  });
}
